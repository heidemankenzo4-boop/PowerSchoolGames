<!DOCTYPE html>
<html>
<head>
  <title>PowerSchool Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>🎮 PowerSchool Games</header>

<div class="games">
  <div class="card">
    <h2>Game 1</h2>
    <a href="game1.html"><button>Play</button></a>
  </div>

  <div class="card">
    <h2>Game 2</h2>
    <a href="game2.html"><button>Play</button></a>
  </div>
</div>

</body>
</html>
